# =============================================================================
# DEPENDABOT - Configuration AI-Pulse
# =============================================================================
# Auteur      : ThePhoenixAgency
# Mise à jour : 5 Mars 2026
# Version     : 2.1.0
#
# DESCRIPTION :
# Dependabot surveille automatiquement les dépendances NPM et GitHub Actions.
# Il crée des Pull Requests vers la branche "security" dès qu'une mise à jour
# est disponible. Les PRs sont mergées automatiquement sur "main" via auto-merge,
# de façon silencieuse, sans validation ni intervention manuelle.
#
# LOGIQUE DE BRANCHEMENT :
# Dependabot -> PR sur "security" -> auto-merge silencieux sur "main"
# La branche "security" isole les mises à jour de dépendances du code métier.
#
# ANTI-CHEVAUCHEMENT :
# Le workflow principal tourne à : 00h, 03h, 06h, 09h, 12h, 15h, 18h, 21h UTC.
# Les passes Dependabot sont placées au milieu des créneaux libres :
#   Passe 1 NPM     -> 01:30 UTC  (entre 00h et 03h)
#   Passe 2 NPM     -> 07:30 UTC  (entre 06h et 09h)
#   Passe 3 NPM     -> 14:30 UTC  (entre 12h et 15h)
#   GitHub Actions  -> 10:30 UTC  (entre 09h et 12h)
# Aucun risque de collision avec les jobs actifs.
#
# ROLLBACK AUTO :
# rebase-strategy: "auto" -> Dependabot rebase sa PR automatiquement
# en cas de conflit, sans intervention manuelle.
# =============================================================================
version: 2
updates:
  # ---------------------------------------------------------------------------
  # PASSE 1 NPM - 01:30 UTC (creux entre 00h et 03h)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "security"
    rebase-strategy: "auto"
    schedule:
      interval: "daily"
      time: "01:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "auto-merge"
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    allow:
      - dependency-type: "all"

  # ---------------------------------------------------------------------------
  # PASSE 2 NPM - 07:30 UTC (creux entre 06h et 09h)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "security"
    rebase-strategy: "auto"
    schedule:
      interval: "daily"
      time: "07:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "auto-merge"
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    allow:
      - dependency-type: "all"

  # ---------------------------------------------------------------------------
  # PASSE 3 NPM - 14:30 UTC (creux entre 12h et 15h)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "security"
    rebase-strategy: "auto"
    schedule:
      interval: "daily"
      time: "14:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "auto-merge"
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    allow:
      - dependency-type: "all"

  # ---------------------------------------------------------------------------
  # GITHUB ACTIONS - 10:30 UTC (creux entre 09h et 12h)
  # Surveille les versions des actions dans .github/workflows/
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "security"
    rebase-strategy: "auto"
    schedule:
      interval: "daily"
      time: "10:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "github-actions"
      - "security"
      - "auto-merge"
    commit-message:
      prefix: "ci(deps): "
      include: "scope"
